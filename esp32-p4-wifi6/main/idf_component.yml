dependencies:
  idf:
    version: ">=5.3"
  # WiFi 6 on the P4 runs on the on-board ESP32-C6 over esp-hosted; these
  # two components make the standard esp_wifi API route to the co-processor.
  espressif/esp_wifi_remote: "*"
  espressif/esp_hosted: "*"
  # ES8311 codec driver (the on-board microphone hangs off an ES8311).
  espressif/esp_codec_dev: "^1.3.1"
  # Wake word engine (WakeNet). esp-sr v2 is the first release that
  # supports the ESP32-P4.
  espressif/esp-sr: "^2.0"
